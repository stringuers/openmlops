services:
  # ─── MinIO (S3-compatible storage for DVC) ───────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    container_name: openmlops-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "/usr/bin/mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops_network

  # ─── MinIO bucket initializer ────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: openmlops-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; mc mb --ignore-existing myminio/dvc-store; mc mb --ignore-existing myminio/mlflow-artifacts; echo 'Buckets created.'; "
    networks:
      - mlops_network

  # ─── PostgreSQL (MLflow backend) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: openmlops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow123}
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops_network

  # ─── MLflow Tracking Server ───────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: openmlops-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: sh -c "pip install --no-cache-dir mlflow==2.13.0 psycopg2-binary boto3 && mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow123}@postgres:5432/mlflow --default-artifact-root s3://mlflow-artifacts/ --host 0.0.0.0 --port 5000"
    ports:
      - "5001:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - mlops_network

  # ─── ZenML Server ─────────────────────────────────────────────────────────
  zenml:
    image: zenmldocker/zenml-server:0.57.1
    container_name: openmlops-zenml
    ports:
      - "8080:8080"
    environment:
      ZENML_DEFAULT_USER_NAME: admin
      ZENML_DEFAULT_USER_PASSWORD: ${ZENML_PASSWORD:-Admin123#}
      ZENML_STORE_TYPE: sql
      ZENML_STORE_URL: sqlite:////zenml/zenml.db
    volumes:
      - zenml_data:/zenml
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/info')" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - mlops_network

  # ─── ZenML Stack Setup (one-shot init) ────────────────────────────────────
  zenml-setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmlops-zenml-setup
    depends_on:
      zenml:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    command: bash scripts/setup_zenml_stack.sh
    environment:
      ZENML_STORE_URL: http://zenml:8080
      ZENML_STORE_USERNAME: admin
      ZENML_STORE_PASSWORD: ${ZENML_PASSWORD:-Admin123#}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    profiles:
      - setup
    networks:
      - mlops_network
    restart: "no"

  # ─── Training Pipeline ────────────────────────────────────────────────────
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmlops-trainer
    depends_on:
      mlflow:
        condition: service_healthy
      zenml:
        condition: service_healthy
    command: [ "python", "src/pipelines/run_training.py" ]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      ZENML_STORE_URL: http://zenml:8080
      ZENML_STORE_USERNAME: admin
      ZENML_STORE_PASSWORD: ${ZENML_PASSWORD:-Admin123#}
      DATA_DIR: /app/data
      TRAIN_EPOCHS: ${TRAIN_EPOCHS:-20}
      BATCH_SIZE: ${BATCH_SIZE:-128}
      LEARNING_RATE: ${LEARNING_RATE:-0.001}
      DROPOUT_RATE: ${DROPOUT_RATE:-0.5}
      MIN_ACCURACY_THRESHOLD: ${MIN_ACCURACY_THRESHOLD:-0.70}
      DVC_REMOTE_URL: s3://dvc-store
      AWS_S3_ENDPOINT: http://minio:9000
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/artifacts
    profiles:
      - train
    networks:
      - mlops_network

  # ─── Monitoring Pipeline ──────────────────────────────────────────────────
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmlops-monitor
    depends_on:
      mlflow:
        condition: service_healthy
      zenml:
        condition: service_healthy
    command: [ "python", "src/pipelines/run_monitoring.py" ]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      ZENML_STORE_URL: http://zenml:8080
      ZENML_STORE_USERNAME: admin
      ZENML_STORE_PASSWORD: ${ZENML_PASSWORD:-Admin123#}
      DATA_DIR: /app/data
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD:-0.15}
      INJECT_DRIFT: ${INJECT_DRIFT:-false}
      AUTO_RETRAIN: ${AUTO_RETRAIN:-false}
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/artifacts
      - app_monitoring:/app/monitoring
    profiles:
      - monitor
    networks:
      - mlops_network

  # ─── Monitoring with Drift Injection (demo) ───────────────────────────────
  monitor-drift:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmlops-monitor-drift
    depends_on:
      mlflow:
        condition: service_healthy
      zenml:
        condition: service_healthy
    command: [ "python", "src/pipelines/run_monitoring.py" ]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      ZENML_STORE_URL: http://zenml:8080
      ZENML_STORE_USERNAME: admin
      ZENML_STORE_PASSWORD: ${ZENML_PASSWORD:-Admin123#}
      DATA_DIR: /app/data
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD:-0.15}
      INJECT_DRIFT: "true"
      AUTO_RETRAIN: ${AUTO_RETRAIN:-false}
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/artifacts
      - app_monitoring:/app/monitoring
    profiles:
      - monitor-drift
    networks:
      - mlops_network

volumes:
  minio_data:
  postgres_data:
  zenml_data:
  app_data:
  app_artifacts:
  app_monitoring:


networks:
  mlops_network:
    driver: bridge
